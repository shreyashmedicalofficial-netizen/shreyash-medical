<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shreyash Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/admin.css">
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            overflow: hidden;
        }

        .login-header {
            background-color: var(--admin-primary);
            color: white;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .login-header i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--admin-secondary);
        }

        .login-body {
            padding: 40px 30px;
            background: white;
        }

        .form-control {
            height: 50px;
            padding-left: 20px;
            border-radius: 10px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
        }

        .form-control:focus {
            background-color: white;
            border-color: var(--admin-primary);
            box-shadow: 0 0 0 4px rgba(42, 107, 66, 0.1);
        }

        .btn-login {
            height: 50px;
            font-size: 1rem;
            letter-spacing: 0.5px;
            border-radius: 10px;
            background-color: var(--admin-primary);
            border: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background-color: #1e4d2f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42, 107, 66, 0.3);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-heartbeat"></i>
            <h4 class="fw-bold mb-1">Welcome Back</h4>
            <p class="mb-0 opacity-75 small">Sign in to manage your pharmacy</p>
        </div>
        <div class="login-body">
            <form id="loginForm">
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@company.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>
                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-primary btn-login text-white">
                        <span id="btnText">Sign In</span>
                        <div id="btnLoader" class="spinner-border spinner-border-sm text-white d-none" role="status">
                        </div>
                    </button>
                </div>
                <!-- Error Alert -->
                <div id="loginError" class="alert alert-danger d-none small border-0 bg-danger-subtle text-danger">
                </div>

                <div class="text-center">
                    <a href="#" class="text-decoration-none text-muted small hover-lift">Forgot Password?</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { auth, signInWithEmailAndPassword, db, ref, get } from '../assets/js/firebase-config.js';

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('loginError');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;

            // Simple Validation
            if (!email || !password) {
                showError('Please fill in all fields.');
                return;
            }

            // Loading State
            btnText.classList.add('d-none');
            btnLoader.classList.remove('d-none');
            loginError.classList.add('d-none');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const firebaseUser = userCredential.user;
                console.log("Logged in:", firebaseUser.email);

                // Fetch user role from DB to decide redirect
                let redirectUrl = 'index.html';
                try {
                    const usersSnap = await get(ref(db, 'users'));
                    if (usersSnap.exists()) {
                        const usersData = usersSnap.val();
                        const dbUser = Object.values(usersData).find(
                            u => u.email && u.email.toLowerCase() === firebaseUser.email.toLowerCase()
                        );
                        if (dbUser) {
                            const role = (dbUser.role || '').toLowerCase();
                            if (role === 'manager' && dbUser.branchId) {
                                redirectUrl = `index.html?branch=${dbUser.branchId}`;
                            }
                        }
                    }
                } catch (dbErr) {
                    console.warn('Could not fetch user role for redirect:', dbErr);
                }

                window.location.href = redirectUrl;
            } catch (error) {
                console.error("Login Error:", error);
                let msg = "Invalid email or password.";
                if (error.code === 'auth/user-not-found') msg = "No user found with this email.";
                if (error.code === 'auth/wrong-password') msg = "Incorrect password.";
                if (error.code === 'auth/too-many-requests') msg = "Too many failed attempts. Try again later.";
                showError(msg);

                // Reset Button
                btnText.classList.remove('d-none');
                btnLoader.classList.add('d-none');
            }
        });

        function showError(msg) {
            loginError.textContent = msg;
            loginError.classList.remove('d-none');
        }
    </script>
</body>

</html>
