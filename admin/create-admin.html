<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin - Shreyash Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/admin.css">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-header bg-white border-0 py-3 d-flex align-items-center">
                        <a href="users.html" class="btn btn-sm btn-outline-secondary me-3">
                            <i class="fas fa-arrow-left"></i>
                        </a>
                        <div>
                            <h5 class="mb-0 fw-bold">Create New Admin</h5>
                            <small class="text-muted">Add a new admin account with email & password</small>
                        </div>
                    </div>
                    <div class="card-body p-4">
                        <div id="alertPlaceholder"></div>

                        <form id="createAdminForm" novalidate>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Full Name</label>
                                <input type="text" class="form-control" id="fullname" required
                                    placeholder="Admin full name">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email Address</label>
                                <input type="email" class="form-control" id="email" required
                                    placeholder="admin@example.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Phone (optional)</label>
                                <input type="text" class="form-control" id="phone" placeholder="+91-XXXXXXXXXX">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Role</label>
                                <select class="form-select" id="role" required>
                                    <option value="admin">Admin</option>
                                    <option value="manager">Manager</option>
                                </select>
                            </div>
                            <div class="mb-3 d-none" id="branchGroup">
                                <label class="form-label fw-semibold">Assign Branch <span
                                        class="text-danger">*</span></label>
                                <select class="form-select" id="branchSelect">
                                    <option value="" disabled selected>Loading branches...</option>
                                </select>
                                <div class="form-text text-muted">Select the branch this manager will handle</div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Password</label>
                                    <input type="password" class="form-control" id="password" required minlength="6"
                                        placeholder="At least 6 characters">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Confirm Password</label>
                                    <input type="password" class="form-control" id="confirmPassword" required
                                        minlength="6" placeholder="Re-enter password">
                                </div>
                            </div>

                            <div class="d-grid mt-3">
                                <button type="submit" class="btn btn-primary" id="createAdminBtn">
                                    <i class="fas fa-user-shield me-2"></i>Create Admin
                                </button>
                                <button type="button" class="btn btn-primary d-none" id="loadingBtn" disabled>
                                    <span class="spinner-border spinner-border-sm me-2"></span>Creating...
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, createUserWithEmailAndPassword, db, ref, set, get, child, onValue } from '../assets/js/firebase-config.js';
        import { getAuthErrorMessage, isValidEmail, isValidPassword } from '../assets/js/auth-utils.js';

        const form = document.getElementById('createAdminForm');
        const alertPlaceholder = document.getElementById('alertPlaceholder');
        const createBtn = document.getElementById('createAdminBtn');
        const loadingBtn = document.getElementById('loadingBtn');
        const roleSelect = document.getElementById('role');
        const branchGroup = document.getElementById('branchGroup');
        const branchSelect = document.getElementById('branchSelect');

        // ---- Load branches from Firebase ----
        let branchOptions = []; // { id, name }

        function loadBranches() {
            // Load from 'stores' node (push-key based)
            onValue(ref(db, 'stores'), (snapshot) => {
                const data = snapshot.val();
                const storeEntries = [];
                if (data) {
                    Object.keys(data).forEach(key => {
                        if (data[key] && data[key].name) {
                            storeEntries.push({ id: key, name: data[key].name });
                        }
                    });
                }

                // Also load from 'branches' node (array-based, old format)
                onValue(ref(db, 'branches'), (brSnap) => {
                    const brData = brSnap.val();
                    const branchEntries = [];
                    if (brData) {
                        if (Array.isArray(brData)) {
                            brData.forEach((br, idx) => {
                                if (br && br.name) branchEntries.push({ id: String(idx), name: br.name });
                            });
                        } else {
                            Object.keys(brData).forEach(key => {
                                if (brData[key] && brData[key].name) branchEntries.push({ id: key, name: brData[key].name });
                            });
                        }
                    }

                    // Merge: prefer stores, add branches that aren't duplicates
                    const seenNames = new Set(storeEntries.map(s => s.name.toLowerCase()));
                    branchOptions = [...storeEntries];
                    branchEntries.forEach(b => {
                        if (!seenNames.has(b.name.toLowerCase())) {
                            branchOptions.push(b);
                            seenNames.add(b.name.toLowerCase());
                        }
                    });

                    renderBranchOptions();
                }, { onlyOnce: true });
            }, { onlyOnce: true });
        }

        function renderBranchOptions() {
            branchSelect.innerHTML = '<option value="" disabled selected>-- Select Branch --</option>';
            if (branchOptions.length === 0) {
                branchSelect.innerHTML += '<option value="" disabled>No branches found</option>';
                return;
            }
            branchOptions.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.id;
                opt.textContent = b.name;
                branchSelect.appendChild(opt);
            });
        }

        loadBranches();

        // ---- Show/hide branch selector based on role ----
        roleSelect.addEventListener('change', () => {
            if (roleSelect.value === 'manager') {
                branchGroup.classList.remove('d-none');
                branchSelect.setAttribute('required', 'required');
            } else {
                branchGroup.classList.add('d-none');
                branchSelect.removeAttribute('required');
                branchSelect.value = '';
            }
        });

        function showAlert(type, message) {
            alertPlaceholder.innerHTML = `
                <div class="alert alert-${type} border-0" role="alert">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} me-2"></i>${message}
                </div>`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const role = roleSelect.value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Get branch info if manager
            let branchId = '';
            let branchName = '';
            if (role === 'manager') {
                branchId = branchSelect.value;
                if (!branchId) {
                    showAlert('danger', 'Please select a branch for the manager.');
                    return;
                }
                const selected = branchOptions.find(b => b.id === branchId);
                branchName = selected ? selected.name : '';
            }

            if (!fullname || !email || !password || !confirmPassword) {
                showAlert('danger', 'All required fields must be filled.');
                return;
            }
            if (!isValidEmail(email)) {
                showAlert('danger', 'Please enter a valid email address.');
                return;
            }
            if (!isValidPassword(password)) {
                showAlert('danger', 'Password must be at least 6 characters.');
                return;
            }
            if (password !== confirmPassword) {
                showAlert('danger', 'Passwords do not match.');
                return;
            }

            // UI loading state
            createBtn.classList.add('d-none');
            loadingBtn.classList.remove('d-none');
            alertPlaceholder.innerHTML = '';

            try {
                // Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const newUser = userCredential.user;

                // Build user data
                const userData = {
                    id: newUser.uid,
                    fullname,
                    email,
                    phone,
                    password: 'hashed_by_firebase',
                    role: role,
                    created_at: new Date().toISOString()
                };

                // Add branch info for managers
                if (role === 'manager' && branchId) {
                    userData.branchId = branchId;
                    userData.branch = branchName;
                }

                // Store in Realtime DB
                await set(ref(db, 'users/' + newUser.uid), userData);

                const roleLabel = role === 'manager' ? `Manager (${branchName})` : 'Admin';
                showAlert('success', `${roleLabel} created successfully! Redirecting to login...`);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                console.error('Create admin error:', error);
                showAlert('danger', getAuthErrorMessage(error.code));
            } finally {
                createBtn.classList.remove('d-none');
                loadingBtn.classList.add('d-none');
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
