<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Prescription - Shreyash Pharmacy</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tesseract.js -->
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .upload-area {
            border: 2px dashed var(--primary-color);
            border-radius: 12px;
            background-color: #f8f9fa;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            background-color: #e9ecef;
            border-color: var(--primary-dark);
        }

        .scanning-animation {
            height: 4px;
            width: 100%;
            background: linear-gradient(to right, transparent, var(--secondary-color), transparent);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 1.5s infinite linear;
            display: none;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            50% {
                top: 100%;
            }

            100% {
                top: 0;
            }
        }

        .preview-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            max-height: 400px;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Main Content -->
    <div class="bg-light flex-grow-1 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="text-center mb-5">
                        <h2 class="fw-bold section-title">Upload Prescription</h2>
                        <p class="text-muted">Upload a clear image of your prescription, and we will find the medicines
                            for you.</p>
                    </div>

                    <!-- Upload Section -->
                    <div class="card border-0 shadow-sm rounded-4 mb-4" id="upload-section">
                        <div class="card-body p-5 text-center">
                            <input type="file" id="prescription-input" class="d-none" accept="image/*"
                                capture="environment">
                            <div class="upload-area p-5"
                                onclick="document.getElementById('prescription-input').click()">
                                <i class="fas fa-camera fa-4x text-primary-custom mb-3"></i>
                                <h5 class="fw-bold">Tap to Take Photo or Upload</h5>
                                <p class="text-muted small mb-0">Supported formats: JPG, PNG</p>
                            </div>
                        </div>
                    </div>

                    <!-- Preview & Scanning Section -->
                    <div class="card border-0 shadow-sm rounded-4 mb-4 d-none" id="preview-section">
                        <div class="card-body p-0 position-relative">
                            <div class="preview-container">
                                <img id="preview-image" src="" class="w-100 object-fit-contain"
                                    alt="Prescription Preview">
                                <div class="scanning-animation" id="scanning-line"></div>
                            </div>
                            <div class="p-4 text-center">
                                <h5 class="fw-bold mb-3" id="scan-status-text">Analyzing Prescription...</h5>
                                <div class="progress" style="height: 6px;">
                                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary-custom"
                                        role="progressbar" style="width: 0%" id="scan-progress"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Results Section -->
            <div id="results-section" class="d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold">Detected Medicines</h3>
                    <button class="btn btn-outline-primary fw-bold" onclick="window.location.reload()"><i
                            class="fas fa-redo me-2"></i> Scan Another</button>
                </div>

                <div class="row g-4" id="detected-products-container">
                    <!-- Products will be injected here -->
                </div>

                <div class="text-center mt-5">
                    <a href="cart.html" class="btn btn-primary-custom px-5 py-3 fw-bold shadow-lg">
                        Proceed to Checkout <i class="fas fa-arrow-right ms-2"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Main App JS -->
    <script type="module" src="assets/js/app.js"></script>

</body>

</html>
