<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Shreyash Pharmacy</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Content -->
    <div class="bg-light py-5 flex-grow-1">
        <div class="container">
            <div class="row">
                <!-- Sidebar -->
                <div class="col-lg-3 mb-4">
                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                        <div class="card-body p-0">
                            <div class="bg-primary-custom p-4 text-white text-center" id="profile-sidebar-header">
                                <div class="spinner-border text-light spinner-border-sm" role="status"></div>
                            </div>
                            <div class="list-group list-group-flush py-2">
                                <a href="profile.html"
                                    class="list-group-item list-group-item-action border-0 px-4 py-3 fw-medium">
                                    <i class="fas fa-user-circle me-3 text-muted"></i> My Profile
                                </a>
                                <a href="my_orders.html"
                                    class="list-group-item list-group-item-action border-0 px-4 py-3 fw-medium active bg-light text-primary-custom fw-bold">
                                    <i class="fas fa-box-open me-3"></i> My Orders
                                </a>
                                <a href="profile.html#address-section"
                                    class="list-group-item list-group-item-action border-0 px-4 py-3 fw-medium">
                                    <i class="fas fa-home me-3 text-muted"></i> Addresses
                                </a>
                                <button id="sidebar-logout"
                                    class="list-group-item list-group-item-action border-0 px-4 py-3 fw-medium text-danger bg-transparent">
                                    <i class="fas fa-sign-out-alt me-3"></i> Logout
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Orders List -->
                <div class="col-lg-9">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-header bg-white border-bottom p-0">
                            <ul class="nav nav-tabs card-header-tabs px-4 pt-2 border-bottom-0">
                                <li class="nav-item">
                                    <a class="nav-link active fw-bold text-primary-custom border-bottom-0" href="#">All
                                        Orders</a>
                                </li>
                            </ul>
                        </div>
                        <div class="card-body p-4" id="orders-container">
                            <div class="text-center py-5">
                                <div class="spinner-border text-primary-custom" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Main App JS -->
    <script type="module" src="assets/js/app.js"></script>

</body>

</html>
