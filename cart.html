<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Shreyash Pharmacy</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Header Container -->
<div id="header-container"></div>

<!-- Cart Content -->
<div class="bg-light py-5 flex-grow-1" style="min-height: 80vh;">
    <div class="container-fluid px-md-5">
        <h3 class="fw-bold mb-4">My Cart</h3>

        <div class="row g-4">
            <!-- Left: Cart Items -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 mb-3">
                    <div class="card-body p-0" id="cart-items-container">
                         <!-- Loaded via JS -->
                         <div class="d-flex align-items-center justify-content-center py-5">
                             <div class="spinner-border text-primary-custom" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Bill Details -->
            <div class="col-lg-4">
                 <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4" id="cart-summary-container">
                        <!-- Loaded via JS -->
                         <div class="placeholder-glow">
                             <span class="placeholder col-12 mb-3"></span>
                             <span class="placeholder col-12 mb-3"></span>
                             <span class="placeholder col-8"></span>
                         </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer Container -->
<div id="footer-container"></div>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Main App JS -->
<script type="module" src="assets/js/app.js"></script>

</body>
</html>
